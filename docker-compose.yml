version: "3.4"
services:
  postgres-db:
    image: postgres:16.2-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=wO2VGDsMKR
      - max_wal_size=2GB
    ports:
      - "5432:5432"
    networks:
      - network
    volumes:
      - postgres-db-16-2a:/var/lib/postgresql/data-16-2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  postgres-b-db:
    image: postgres:16.2-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=wO2VGDsMKR
      - max_wal_size=2GB
      - PGPORT=5433
    ports:
      - "5433:5433"
    networks:
      - network
    volumes:
      - postgres-db-16-2b:/var/lib/postgresql/data-16-2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
  ############################
  # API App + Dapr sidecar
  ############################
  dotnet:
    environment:
      - DAPR_GRPC_ENDPOINT=http://dotnet-dapr:50001
      - DAPR_HTTP_ENDPOINT=http://dotnet-dapr:3500
      - REGISTER_WORKFLOWS=true
      - REGISTER_ACTIVITIES=true
    build:
      context: .
      dockerfile: dotnet/Dockerfile
    ports:
      - "5111:5111"
      - "7776:7776"
    depends_on:
      dotnet-dapr:
        condition: service_started
    networks:
      - network
  dotnet-dapr:
    image: "${DAPR_RUNTIME_VERSION}"
    ports:
      - "3500:3500" # only important so we can reach the Dapr HTTP sidecar from the host for testing purposes
    command:
      [
        "./daprd",
        "-app-id",
        "dotnet",
        "-app-channel-address",
        "dotnet",
        "-app-port",
        "5111",
        "-dapr-http-port",
        "3500",
        "-dapr-grpc-port",
        "50001",
        "-placement-host-address",
        "placement:50005",
        "-scheduler-host-address",
        "scheduler-0:50006",
        "-resources-path",
        "/components",
        "-config",
        "/dapr-config/config.yml",
        "-log-level",
        "info",
      ]
    volumes:
      - "./components/:/components"
      - "./dapr-config/:/dapr-config"
    depends_on:
      postgres-db:
        condition: service_healthy
      placement:
        condition: service_started
      scheduler-0:
        condition: service_started
    networks:
      - network

  ############################
  # Semantic Search App + Dapr sidecar
  ############################
  python:
    environment:
      - DAPR_GRPC_ENDPOINT=http://python-dapr:50001
      - DAPR_HTTP_ENDPOINT=http://python-dapr:3500
      - REGISTER_WORKFLOWS=false
      - REGISTER_ACTIVITIES=true
    build:
      context: ./python
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    networks:
      - network
  python-dapr:
    image: "${DAPR_RUNTIME_VERSION}"
    ports:
      - "3501:3500" # Dapr HTTP port (different from workflow-a)
      - "50002:50001" # Dapr gRPC port (different from workflow-a)
    command:
      [
        "./daprd",
        "-app-id",
        "python",
        "-app-channel-address",
        "python",
        "-app-port",
        "8000",
        "-dapr-http-port",
        "3500",
        "-dapr-grpc-port",
        "50001",
        "-placement-host-address",
        "placement:50005",
        "-scheduler-host-address",
        "scheduler-0:50006",
        "-resources-path",
        "/components",
        "-config",
        "/dapr-config/config.yml",
        "-log-level",
        "info",
      ]
    volumes:
      - "./components/:/components"
      - "./dapr-config/:/dapr-config"
    depends_on:
      postgres-db:
        condition: service_healthy
      placement:
        condition: service_started
      scheduler-0:
        condition: service_started
    healthcheck:
      test:
        ["CMD", "wget", "-q", "--spider", "http://localhost:3500/v1.0/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - network

        ############################
  # Semantic Search App + Dapr sidecar
  ############################
  python-2:
    environment:
      - DAPR_GRPC_ENDPOINT=http://python-2-dapr:50001
      - DAPR_HTTP_ENDPOINT=http://python-2-dapr:3500
      - REGISTER_WORKFLOWS=false
      - REGISTER_ACTIVITIES=true
    build:
      context: ./python
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    networks:
      - network
  python-2-dapr:
    image: "${DAPR_RUNTIME_VERSION}"
    ports:
      - "3502:3500" # Dapr HTTP port (different from workflow-a)
      - "50003:50001" # Dapr gRPC port (different from workflow-a)
    command:
      [
        "./daprd",
        "-app-id",
        "python",
        "-app-channel-address",
        "python",
        "-app-port",
        "8000",
        "-dapr-http-port",
        "3500",
        "-dapr-grpc-port",
        "50001",
        "-placement-host-address",
        "placement:50005",
        "-scheduler-host-address",
        "scheduler-0:50006",
        "-resources-path",
        "/components",
        "-config",
        "/dapr-config/config.yml",
        "-log-level",
        "info",
      ]
    volumes:
      - "./components/:/components"
      - "./dapr-config/:/dapr-config"
    depends_on:
      postgres-db:
        condition: service_healthy
      placement:
        condition: service_started
      scheduler-0:
        condition: service_started
    healthcheck:
      test:
        ["CMD", "wget", "-q", "--spider", "http://localhost:3500/v1.0/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - network

  ############################
  # Dapr placement service
  ############################
  placement:
    image: "${DAPR_PLACEMENT_VERSION}"
    command: ["./placement", "-port", "50005", "-log-level", "warn"]
    networks:
      - network
    ports:
      - "50005:50005"

  # ############################
  # # Dapr Scheduler service
  # ############################
  scheduler-0:
    image: "${DAPR_SCHEDULER_VERSION}"
    command:
      [
        "./scheduler",
        "--id",
        "scheduler-0",
        "--listen-address",
        "0.0.0.0",
        "--etcd-data-dir",
        "/var/run/dapr/scheduler",
        "--etcd-initial-cluster",
        "scheduler-0=http://scheduler-0:2380",
        "--port",
        "50006",
        "--override-broadcast-host-port",
        "scheduler-0:50006",
      ]
    volumes:
      - ./dapr_scheduler/0:/var/run/dapr/scheduler
    networks:
      - network
    ports:
      - "50006:50006"
      - "2380:2380"

  workflow-dashboard:
    image: ghcr.io/diagridio/diagrid-dashboard:latest
    restart: always
    environment:
      - COMPONENT_FILE=/app/components/custom_state.yaml
    ports:
      - 8081:8080
    networks:
      - network
    volumes:
      - "./components/statestore-pg-v2.yaml:/app/components/custom_state.yaml"

  ############################
  # Web UI for SSE Testing
  ############################
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    networks:
      - network

  ############################
  # pgAdmin (Database Management UI)
  ############################
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: always
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
      - PGADMIN_CONFIG_SERVER_MODE=False
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./dapr/pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./dapr/pgadmin/pgpassfile:/tmp/pgpassfile:ro
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - network

networks:
  network:
    driver: bridge

volumes:
  db-data:
    driver: local
  postgres-db-16-2a:
    driver: local
  postgres-db-16-2b:
    driver: local
  pgadmin-data:
    driver: local
